services:
  papirus-ai-admin:
    build:
      context: .
    container_name: papirus-ai-admin
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:5432/examengine}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-local-dev-secret-change-me}
      ADMIN_COOKIE_SECURE: ${ADMIN_COOKIE_SECURE:-false}
      PORT: 3344
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3344:3344"
    restart: unless-stopped
