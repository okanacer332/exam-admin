services:
  papirus-ai-admin:
    build:
      context: .
    container_name: papirus-ai-admin
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:5432/papirus_ai}
      ADMIN_CHALLENGE_ANSWER: ${ADMIN_CHALLENGE_ANSWER:?ADMIN_CHALLENGE_ANSWER .env dosyasinda tanimli olmali}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD .env dosyasinda tanimli olmali}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:?ADMIN_SESSION_SECRET .env dosyasinda tanimli olmali}
      ADMIN_COOKIE_SECURE: ${ADMIN_COOKIE_SECURE:-false}
      ADMIN_DB_BOOT_ATTEMPTS: ${ADMIN_DB_BOOT_ATTEMPTS:-20}
      ADMIN_DB_BOOT_DELAY_MS: ${ADMIN_DB_BOOT_DELAY_MS:-1500}
      PORT: 3344
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3344:3344"
    restart: unless-stopped
